name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write # allows the workflow to publish the APK as a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk timbre.apk

      - name: Publish APK as a Release (direct download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Timbre build ${{ github.run_number }}
          body: >
            Open this page on your phone and tap **timbre.apk** below to
            install. Android will ask once for permission to install from
            your browser — allow it, then tap Install.
          files: timbre.apk

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: timbre-debug-apk
          path: timbre.apk
